<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Visa Authentication</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, Helvetica, sans-serif;
            background: #404040;
        }

        .card {
            background: #fff;
            padding: 32px;
            border-radius: 6px;
            text-align: center;
            width: 320px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid #eee;
            border-top: 5px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        .text {
            margin-top: 16px;
            font-size: 14px;
            color: #444;
        }

        #fallbackBtn {
            display: none;
            margin-top: 10px;
            padding: 14px 28px;
            font-size: 16px;
            border-radius: 6px;
            border: none;
            background: #1a73e8;
            color: #fff;
            cursor: pointer;
            width: 100%;
        }

        .hidden {
            display: none !important;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <iframe id="vpp-iframe" style="visibility:hidden" width="0" height="0"
        allow="payment *; publickey-credentials-get *; publickey-credentials-create *"
        referrerpolicy="strict-origin-when-cross-origin" sandbox="
    allow-scripts
    allow-same-origin
    allow-forms
    allow-popups
    allow-popups-to-escape-sandbox
    allow-top-navigation-by-user-activation
    allow-modals
  ">
    </iframe>

    <div class="card">
        <div id="loader" class="loader"></div>
        <div id="statusText" class="text">Processing your payment</div>
        <button id="fallbackBtn">Process payment</button>
    </div>

    <script>
        const API_TOKEN_HOST = "http://localhost:3000";
        const VISA_BASE = "https://sandbox.auth.visa.com";
        const VISA_INIT_URL = `${VISA_BASE}/oauth2/authorization/request/hub#msg=`;

        const RETURN_URL = "https://weak-tova-ungently.ngrok-free.dev/v2/pay/response";
        const RETURN_URL_HOST = "https://weak-tova-ungently.ngrok-free.dev";
        const AUTH_TIMEOUT = 600000;

        let popupRef = null;
        let popupWatcher = null;
        let timeoutRef = null;
        let serverStateToken = null;
        let deviceProfilingDone = false;
        let flowStarted = false;
        let hasSubmitted = false;
        let apiResponseData = null;
        let isOpenPopup = false;

        function openVisaPopup(data) {
            isOpenPopup = true;
            const popupMsg = {
                type: "COMMAND",
                ref: crypto.randomUUID(),
                ts: Date.now(),
                command: {
                    type: "AUTHORIZATION_REQUEST",
                    data: {
                        request: data.request,
                        authorization_endpoint: data.authorization_endpoint
                    }
                }
            };
            const popupUrl = `${VISA_BASE}${data.authorization_endpoint}` + `#msg=${encodeURIComponent(JSON.stringify(popupMsg))}`;
            popupRef = window.open(
                popupUrl,
                "visa_passkey",
                "width=400,height=480,top=120,left=200,resizable=no"
            );

            if (!popupRef) {
                showFallbackButton();
                return;
            }
            
            popupWatcher = setInterval(() => {
                if (popupRef.closed && !hasSubmitted) {
                    cleanup();
                    submitError("USER_OPTED_OUT", "User closed the webview", "User closed the webview");
                }
            }, 500);

            timeoutRef = setTimeout(() => {
                cleanup();
                submitError("PASSKEY_USER_TIMED_OUT", "User closed the webview", "User closed the webview");
            }, AUTH_TIMEOUT);
        }

        async function startVisaPopup() {
            if (!serverStateToken || !deviceProfilingDone || flowStarted) return;
            flowStarted = true;
            try {
                const res = await fetch(`${RETURN_URL_HOST}/api/passkey/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ token: serverStateToken })
                });
                const loginData = await res.json();
                if (loginData.data) {
                    apiResponseData = loginData.data;
                    openVisaPopup(loginData.data);
                } else {
                    cleanup();
                    submitError(
                        "PASSKEY_VERIFICATION_FAILURE",
                        loginData?.error || "Passkey login api failed.",
                        loginData?.errorMessage || "Passkey login api failed.",
                    );
                }
            } catch {
                cleanup();
                submitError(
                    "PASSKEY_VERIFICATION_FAILURE",
                    "Passkey login api failed.",
                    "Passkey login api failed.",
                );
            }
        }

        function showFallbackButton() {
            document.getElementById("loader").classList.add("hidden");
            document.getElementById("statusText").classList.add("hidden");
            const btn = document.getElementById("fallbackBtn");
            btn.style.display = "block";
            btn.onclick = () => {
                if(!apiResponseData) return;
                openVisaPopup(apiResponseData);
            };
        }

        window.addEventListener("message", (event) => {
            if (!event.origin.includes("visa.com")) return;
            let msg;
            try {
                msg = typeof event.data === "string" ? JSON.parse(event.data) : event.data;
            } catch {
                return;
            }
            if (msg.type === "RESULT" && msg.result?.command_type === "INITIALIZATION") {
                if (msg.result.status === "SUCCESS") {
                    serverStateToken = msg.result.data.tokens[0].token;
                    startVisaPopup();
                } else {
                    let error = msg.result?.data?.error_details?.error || msg.result?.data?.error || "Internal servar Error"
                    let errorDescription = msg.result?.data?.error_details?.error_description || msg.result?.data?.error_description || "Error while passkey initialization"
                    submitError("PASSKEY_INITIALIZATION_FAILED", error, errorDescription);
                }
            }
            if (msg.type === "EVENT" && msg.event?.type === "DEVICE_DATA_CAPTURED") {
                deviceProfilingDone = true;
                startVisaPopup();
            }
            if (msg.type === "EVENT" && msg.event?.type === "DEVICE_DATA_CAPTURE_FAILED") {
                cleanup();
                let error = msg?.result?.data?.error_details?.error || msg?.result?.data?.error || "Internal servar Error"
                let errorDescription = msg?.result?.data?.error_details?.error_description || msg?.result?.data?.error_description || "Error while device capturing."
                submitError("PASSKEY_DEVICE_DATA_CAPTURE_FAILED", error, errorDescription);
            }
            if (msg.type === "EVENT" && msg.event?.type === "POPUP_WINDOW_TERMINATED" && isOpenPopup) {
                cleanup();
                let error = msg?.result?.data?.error_details?.error || msg?.result?.data?.error || "Internal servar Error"
                let errorDescription = msg?.result?.data?.error_details?.error_description || msg?.result?.data?.error_description || "User closed the window or popup."
                submitError("USER_OPTED_OUT", error, errorDescription);
            }
            if (msg.type === "RESULT" && msg.result?.command_type === "AUTHORIZATION_REQUEST") {
                cleanup();
                if (msg.result.status === "SUCCESS") {
                    submit({
                        passkeyStatus: "PASSKEY_SUCCESS",
                        passkeyResult: "PASSKEY_AUTHENTICATION_SUCCESS",
                        authZToken: msg.result.data.tokens[0].token,
                        error: null,
                        errorMessage: null,

                    });
                } else {
                    let error = msg.result?.data?.error_details?.error || msg.result?.data?.error || "Internal servar Error"
                    let errorDescription = msg.result?.data?.error_details?.error_description || msg.result?.data?.error_description || "Used closed the window or popup."
                    if (error === "USER_ABORTED") {
                        submitError( "USER_OPTED_OUT",error,errorDescription);
                    } else {
                        submitError( "PASSKEY_VERIFICATION_FAILURE",error,errorDescription);
                    }
                }
            }
        });

        function cleanup() {
            flowStarted = false;
            clearInterval(popupWatcher);
            clearTimeout(timeoutRef);
            popupRef?.close();
        }

        function submitError(passkeyResult, error, errorMessage) {
            cleanup();
            submit({
                passkeyStatus: "PASSKEY_FAILURE",
                passkeyResult: passkeyResult,
                error: error,
                errorMessage: errorMessage,
                authZToken: null
            });
        }

        function submit(payload) {
            if (hasSubmitted) return;
            hasSubmitted = true;
            const form = document.createElement("form");
            form.method = "POST";
            form.action = RETURN_URL;

            const input = document.createElement("input");
            input.type = "hidden";
            input.name = "data";
            input.value = JSON.stringify(payload);

            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
        }

        const INIT_COMMAND = {
            type: "COMMAND",
            ref: crypto.randomUUID(),
            ts: Date.now(),
            command: {
                type: "INITIALIZATION",
                data: {
                    response_mode: "com_visa_web_message",
                    redirect_uri: RETURN_URL,
                    session_context: {
                        apn: "vdp-web",
                        client_software: {
                            top_origin: RETURN_URL_HOST,
                            integrator_origin: RETURN_URL_HOST,
                            uebas: [
                                {
                                    source: "VDI",
                                    ref: crypto.randomUUID()
                                }
                            ],
                            id: "VDPW",
                            version: "24.07",
                            oauth2_version: "1.0",
                            tenancy: {
                                product_code: "VDP"
                            }
                        }
                    }
                },
                response_type: "urn:ext:oauth:response-type:server_state"
            }
        };
        
        document.getElementById("vpp-iframe").src = `${VISA_INIT_URL}${encodeURIComponent(JSON.stringify(INIT_COMMAND))}`;
    </script>
</body>
</html>
